name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Prepare app version label
        id: app_version
        run: |
          major=$(node -pe "require('./package.json').version.split('.')[0]")
          echo "label=${major}.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - run: npm run build
        env:
          GITHUB_PAGES: "true"
          VITE_APP_VERSION: ${{ steps.app_version.outputs.label }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
